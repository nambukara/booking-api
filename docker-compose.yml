version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: booking_platform
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point to the docker container 'db' instead of localhost
      DATABASE_URL: postgresql://postgres:mysecretpassword@db:5432/booking_platform?schema=public
    depends_on:
      - db
    # You might want to run migrations automatically before start, but for simplicity we rely on manual or init scripts
    # command: sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  postgres_data:
